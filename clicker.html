<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서버 점검 안내</title>
  <style>
    :root{
      --bg:#0f0e0c;
      --surface:#1a1815;
      --border:#35302a;
      --accent:#e8a020;
      --text:#f0ebe0;
      --muted:#7a7060;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Noto Sans KR',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
    }

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity:.45;
      pointer-events:none;
    }

    .panel{
      width:100%;
      max-width:560px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      padding:42px 32px;
      text-align:center;
      position:relative;
      z-index:1;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }

    .icon{
      font-size:72px;
      margin-bottom:18px;
      animation:float 2.5s ease-in-out infinite;
    }

    h1{
      font-size:clamp(28px,6vw,42px);
      color:var(--accent);
      margin-bottom:14px;
      font-weight:900;
      letter-spacing:-1px;
    }

    .desc{
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
      margin-bottom:30px;
    }

    .time-box{
      background:rgba(232,160,32,.08);
      border:1px solid rgba(232,160,32,.18);
      border-radius:16px;
      padding:18px;
      margin-bottom:26px;
    }

    .time-title{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .time{
      font-size:22px;
      font-weight:800;
      color:var(--accent);
    }

    .footer{
      font-size:13px;
      color:var(--muted);
      opacity:.8;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0px);}
      50%{ transform:translateY(-8px);}
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="icon">🍚</div>

    <h1>서버 점검중</h1>

    <p class="desc">
      현재 서버 점검 및 데이터베이스 이전 작업이 진행중입니다.<br>
      일시적으로 접속이 제한되며, 서비스는 목요일에 다시 오픈될 예정입니다.
    </p>

    <div class="time-box">
      <div class="time-title">예상 점검 종료</div>
      <div class="time">목요일 예정</div>
    </div>

    <div class="footer">
      이용에 불편을 드려 죄송합니다.
    </div>
  </div>

</body>
</html>
